name: Build OSRM Wrapper

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'  # Trigger on release tags like v1.0.0

jobs:
  build-linux:
    name: Build Linux / WSL
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake git pkg-config \
            libboost-iostreams-dev \
            libboost-filesystem-dev \
            libboost-thread-dev \
            libboost-program-options-dev \
            libboost-test-dev \
            libtbb-dev libstxxl-dev \
            lua5.3 liblua5.3-dev \
            libbz2-dev libexpat1-dev \
            flatbuffers-compiler libflatbuffers-dev

      - name: Build
        run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)

      - name: Package
        run: |
          mkdir -p package
          cp build/libosrm_wrapper.so package/
          cp *.hpp package/
          tar czf osrm_cpp_wrapper-macos.tar.gz -C package .

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2        
        with:
          files: osrm_cpp_wrapper-linux.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          brew update
          brew install cmake boost tbb lua bzip2 expat flatbuffers

      - name: Build
        run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(sysctl -n hw.ncpu)

      - name: Package
        run: |
          mkdir -p package
          cp build/libosrm_wrapper.dylib package/
          cp *.hpp package/
          tar czf osrm_cpp_wrapper-macos.tar.gz -C package .

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2        
        with:
          files: osrm_cpp_wrapper-macos.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
